<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOSA 기반 시뮬레이션</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; margin: 0;}
        .container { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box;}
        h2 { text-align: center; color: #333; margin-bottom: 20px; font-size: 1.5em;}
        .road { width: 100%; height: 80px; background-color: #343a40; position: relative; margin-top: 15px; border-radius: 5px; overflow: hidden;}
        .line { width: 100%; height: 2px; background-color: white; border-style: dashed; position: absolute; top: 39px; }
        .stop-line { width: 5px; height: 100%; background-color: white; position: absolute; left: 80%; top: 0; }
        .car { width: 45px; height: 24px; position: absolute; top: 28px; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);}
        .car-control { background-color: #ff6b6b; }
        .car-glosa { background-color: #4dabf7; }
        .light { width: 18px; height: 18px; border-radius: 50%; background-color: green; position: absolute; left: 82%; top: 10px; border: 2px solid #fff; box-shadow: 0 0 10px green; z-index: 5;}
        
        .dashboard { margin-top: 10px; padding: 10px; background: #f1f3f5; border-radius: 5px; font-weight: bold; font-size: 1.1em; display: flex; justify-content: space-between;}
        .metric-stop { color: #495057; }
        .metric-co2 { color: #d9480f; }
        
        .stats { color: #666; font-size: 0.9em; margin-bottom: 5px; margin-top: 15px;}
        button { display: block; width: 100%; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #20c997; color: white; border: none; border-radius: 5px; margin-bottom: 10px; z-index: 10; position: relative;}
        button:hover { background-color: #12b886; }
    </style>
</head>
<body>
    <div class="container">
        <h2>V2I 기반 GLOSA 시스템 실시간 CO2 절감 검증</h2>
        <button onclick="startSim()">시뮬레이션 시작 / 초기화</button>
        
        <div class="stats">▼ <b>통제집단 (일반 차량)</b> : 빨간불 앞 급정거 및 공회전 반복</div>
        <div class="road">
            <div class="stop-line"></div>
            <div class="light" id="light1"></div>
            <div class="line"></div>
            <div class="car car-control" id="car1"></div>
        </div>
        <div class="dashboard">
            <span class="metric-stop">누적 정차: <span id="stop1" style="color:#e03131;">0</span>회</span>
            <span class="metric-co2">CO2 배출량: <span id="co2_1">0.0</span> g</span>
        </div>

        <br><hr style="border: 0; border-top: 1px solid #ddd;"><br>

        <div class="stats">▼ <b>실험집단 (GLOSA)</b> : 사전 서행으로 무정차 통과 유도 (정차 최소화)</div>
        <div class="road">
            <div class="stop-line"></div>
            <div class="light" id="light2"></div>
            <div class="line"></div>
            <div class="car car-glosa" id="car2"></div>
        </div>
        <div class="dashboard">
            <span class="metric-stop">누적 정차: <span id="stop2" style="color:#1971c2;">0</span>회</span>
            <span class="metric-co2">CO2 배출량: <span id="co2_2">0.0</span> g</span>
        </div>
    </div>

    <script>
        let pos1 = 0, pos2 = 0;
        let stopCount1 = 0, stopCount2 = 0;
        let co2_1 = 0.0, co2_2 = 0.0;
        let isRed = false;
        let isStopped1 = false, isStopped2 = false;
        let simInterval = null, lightInterval = null;

        // COPERT 기반 실시간 배출량 파라미터 (프레임당 증가량)
        const CO2_CRUISE = 0.05;      // 주행 중 배출 (약 3g/s)
        const CO2_IDLE = 0.02;        // 정차 중 공회전 배출 (약 1.2g/s)
        const CO2_STOP_PENALTY = 25;  // 정지 후 재출발 시 급가속 페널티 (1회당 25g)

        function startSim() {
            if (simInterval) clearInterval(simInterval); 
            if (lightInterval) clearTimeout(lightInterval);
            
            pos1 = 0; pos2 = 0; stopCount1 = 0; stopCount2 = 0; co2_1 = 0; co2_2 = 0;
            isRed = false; isStopped1 = false; isStopped2 = false;
            
            document.getElementById('car1').style.left = '0%';
            document.getElementById('car2').style.left = '0%';
            document.getElementById('stop1').innerText = '0';
            document.getElementById('stop2').innerText = '0';
            document.getElementById('co2_1').innerText = '0.0';
            document.getElementById('co2_2').innerText = '0.0';
            updateLightColor('green');

            function toggleLight() {
                isRed = !isRed;
                updateLightColor(isRed ? 'red' : 'green');
                lightInterval = setTimeout(toggleLight, isRed ? 3500 : 4000);
            }
            lightInterval = setTimeout(toggleLight, 4000);

            simInterval = setInterval(() => {
                let speed1 = 0.35;
                let speed2 = 0.35;

                // 차량 로직
                if (isRed && pos1 >= 75 && pos1 < 80) speed1 = 0; 
                if (isRed && pos2 >= 20 && pos2 < 78) speed2 = 0.12; 
                if (isRed && pos2 >= 78 && pos2 < 80) speed2 = 0; 

                // 통제집단 카운팅 및 CO2 계산
                if (speed1 === 0) {
                    co2_1 += CO2_IDLE; // 공회전 중
                    if (!isStopped1) { 
                        stopCount1++; 
                        co2_1 += CO2_STOP_PENALTY; // 멈추는 순간 페널티 폭탄!
                        document.getElementById('stop1').innerText = stopCount1; 
                        isStopped1 = true; 
                    }
                } else { 
                    co2_1 += CO2_CRUISE; // 주행 중
                    isStopped1 = false; 
                    pos1 += speed1; 
                }

                // 실험집단 카운팅 및 CO2 계산
                if (speed2 === 0) {
                    co2_2 += CO2_IDLE; 
                    if (!isStopped2) { 
                        stopCount2++; 
                        co2_2 += CO2_STOP_PENALTY; 
                        document.getElementById('stop2').innerText = stopCount2; 
                        isStopped2 = true; 
                    }
                } else { 
                    co2_2 += CO2_CRUISE; 
                    isStopped2 = false; 
                    pos2 += speed2; 
                }

                // 화면 밖으로 나가면 다시 처음으로
                if (pos1 > 100) pos1 = -10;
                if (pos2 > 100) pos2 = -10;

                // UI 업데이트
                document.getElementById('car1').style.left = pos1 + '%';
                document.getElementById('car2').style.left = pos2 + '%';
                document.getElementById('co2_1').innerText = co2_1.toFixed(1);
                document.getElementById('co2_2').innerText = co2_2.toFixed(1);

            }, 16);
        }

        function updateLightColor(color) {
            let lights = document.getElementsByClassName('light');
            for(let i=0; i<lights.length; i++) {
                lights[i].style.backgroundColor = color;
                lights[i].style.boxShadow = `0 0 12px ${color}`;
            }
        }
    </script>
</body>
</html>
